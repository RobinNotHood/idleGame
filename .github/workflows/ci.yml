name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release?"
        type: boolean
        default: true
      version:
        description: "Version (e.g. 1.0.0.0)"
        type: string
        default: "1.0.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      zip: ${{ steps.pkg.outputs.zip }}
      sum: ${{ steps.pkg.outputs.sum }}
      path: ${{ steps.pkg.outputs.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="0.0.0.0-dev"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${V}"

      - name: Build
        run: |
          dotnet restore Jellyfin.Plugin.SubtitleAdjust/Jellyfin.Plugin.SubtitleAdjust.csproj
          dotnet build Jellyfin.Plugin.SubtitleAdjust/Jellyfin.Plugin.SubtitleAdjust.csproj -c Release --no-restore

      - name: Package
        id: pkg
        run: |
          V="${{ steps.ver.outputs.version }}"
          ZIP="subtitle-adjust-${V}.zip"
          mkdir -p dist/pkg
          cp Jellyfin.Plugin.SubtitleAdjust/bin/Release/net8.0/Jellyfin.Plugin.SubtitleAdjust.dll dist/pkg/
          cp Jellyfin.Plugin.SubtitleAdjust/meta.json dist/pkg/
          cd dist/pkg && zip -r "../${ZIP}" . && cd -
          SUM=$(md5sum "dist/${ZIP}" | awk '{print $1}')
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "sum=${SUM}" >> "$GITHUB_OUTPUT"
          echo "path=dist/${ZIP}" >> "$GITHUB_OUTPUT"
          echo "MD5: ${SUM}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-adjust-${{ steps.ver.outputs.version }}
          path: dist/subtitle-adjust-*.zip

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.release || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: subtitle-adjust-${{ needs.build.outputs.version }}
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          files: dist/subtitle-adjust-*.zip
          body: |
            Subtitle Adjust plugin v${{ needs.build.outputs.version }}

            **MD5 checksum**: `${{ needs.build.outputs.sum }}`

            Paste this checksum into `manifest.json` so Jellyfin servers can
            verify the download.
