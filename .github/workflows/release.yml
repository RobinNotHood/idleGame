name: Release plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (e.g. 1.0.0.0)"
        required: true
        default: "1.0.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${V}"

      - name: Build plugin
        run: |
          dotnet restore Jellyfin.Plugin.SubtitleAdjust/Jellyfin.Plugin.SubtitleAdjust.csproj
          dotnet build Jellyfin.Plugin.SubtitleAdjust/Jellyfin.Plugin.SubtitleAdjust.csproj -c Release --no-restore

      - name: Package plugin
        id: pkg
        run: |
          V="${{ steps.ver.outputs.version }}"
          ZIP="subtitle-adjust-${V}.zip"
          mkdir -p dist/pkg
          cp Jellyfin.Plugin.SubtitleAdjust/bin/Release/net8.0/Jellyfin.Plugin.SubtitleAdjust.dll dist/pkg/
          cp Jellyfin.Plugin.SubtitleAdjust/meta.json dist/pkg/
          cd dist/pkg && zip -r "../${ZIP}" . && cd -
          SUM=$(md5sum "dist/${ZIP}" | awk '{print $1}')
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "sum=${SUM}" >> "$GITHUB_OUTPUT"
          echo "path=dist/${ZIP}" >> "$GITHUB_OUTPUT"
          echo "MD5 checksum: ${SUM}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: ${{ steps.pkg.outputs.path }}
          body: |
            Subtitle Adjust plugin v${{ steps.ver.outputs.version }}

            **MD5 checksum**: `${{ steps.pkg.outputs.sum }}`
            **Download**: `${{ steps.pkg.outputs.zip }}`

            After this release completes, update `manifest.json` on main with the
            checksum above so Jellyfin servers can verify the download.
